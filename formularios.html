<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>

        fieldset {
            margin-bottom: 20px;
        }

        label {
            display: inline-block;
            margin-bottom: 5px;
        }

        #nome,
        #email,
        #senha,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        /* Reset básico */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Corpo da página */
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    padding: 20px;
}

/* Formulário */
form {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Fieldsets */
fieldset {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 20px;
}

/* Títulos */
legend {
    font-weight: bold;
    color: #333;
    padding: 0 10px;
}

/* Labels */
label {
    display: block;
    margin-bottom: 5px;
    color: #555;
}

/* Inputs e textarea */
input[type="text"],
input[type="email"],
input[type="password"],
select,
textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    transition: 0.3s;
}

/* Foco */
input:focus,
select:focus,
textarea:focus {
    border-color: #4a90e2;
    outline: none;
}

/* Radio e checkbox */
input[type="radio"],
input[type="checkbox"] {
    margin-right: 5px;
}

/* Botões */
button,
input[type="submit"],
input[type="reset"] {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

/* Botão ver senha */
button {
    background-color: #6c757d;
    color: white;
}

button:hover {
    background-color: #5a6268;
}

/* Submit */
input[type="submit"] {
    background-color: #28a745;
    color: white;
}

input[type="submit"]:hover {
    background-color: #218838;
}

/* Reset */
input[type="reset"] {
    background-color: #dc3545;
    color: rgb(255, 255, 255);
}

input[type="reset"]:hover {
    background-color: #c82333;
}


    </style>
    <script>
        function verSenha() {
       

        let senha = document.getElementById("senha");
        let olho = document.getElementById("olho");
        if (senha.type == "password") {
            senha.type = "text";
            olho.classList.replace("bi-eye", "bi-eye")
        } else {
            senha.type = "password";
            olho.classList.replace("bi-eye-slash", "bi-eye") ;
        } 
    }
        function senhaforte(){
        //declara a variavel senha e atribui o valor do campo da senha
        let senha = document.getElementById("senha").value;

        //declara a variavel testenum e atribui uma expressao regular que verifica se a senha cotem pelo me menos um numero 
        let testNum = /^(?=.*\d)/;
        let testMin = /^(?=.*[a-z])/;
        let testMai = /^(?=.*[a-z])/;
        let testEsp = /^(?=.*[@$!%*?&])/;
        let testTam = /^.{8,}$/;
        let mensagem = "";

        //verifica se a senha nao corrresponde ao teste ao testenum, ou seja, se nao contem pelo menso um numero
        if (!senha.match(testNum)){
            mensagem = "<br>a senha deve conter pelo menios um numero.";
        }
        if (!senha.match(testMin)){
        mensagem += "<br>a senha deve conter pelo menos uma letra minuscula.";
        }
        
        if (!senha.match(testMai)){
        mensagem += "<br>a senha deve conter pelo menso uma letra minuscula.";
        }
        
        if (!senha.match(testEsp)){
        mensagem += "<br>a senha deve conter pelo menos um caractere especial.";
        }

        if (!senha.match(testTam)){
        mensagem += "<br>a senha deve ter pelo menos 8 caracteres.";
        }
        document.getElementById("menssagem-senha").innerHTML = mensagem;
        if(mensagem ==""){
            document.getElementById("senha2").disabled = false;
        }else {
            document.getElementById("senha2").disabled = true;
        }
        
    
    }


    </script>
</head>
<body>
    <form action="https://jkorpela.fi/cgi-bin/echo.cgi" method="post">

        <fieldset>
            <legend>Dados Pessoais</legend>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Nome" required>
            <label for="email">E-mail:</label>

        <fieldset>

            <input type="radio" name="tipo" id="aluno" value="aluno">
            <label for="aluno">Aluno</label>
            <input type="radio" name="tipo" id="professor" value="professor">
            <label for="professor">Professor</label>
            <br>
            <label for="senha">Senha:</label>
            <input onkeyup="senhaforte()" type="password" name="senha" id="senha" placeholder="senha"> 
            <button type="button" onclick="verSenha()" id="olho" class="bi bi-eye"></button>
            <p>
                <span id="menssagem-senha"></span>
            </p>
            <input onkeyup="senhaigual()" type="password" id="senha2" disabled>

                <option value="">Escolha seu nível</option>

            <input type="checkbox" name="promo" id="promo" value="sim" checked>

</html>
